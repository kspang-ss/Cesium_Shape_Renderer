<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">

        <!-- Vendor -->
        <script src="Cesium/Cesium.js"></script>
        <link href="Cesium/widgets/widgets.css" rel="stylesheet">

        <!-- Custom -->
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="cesiumContainer"></div>
        <form id="toolBar">
            <div class="field">
                <input type="checkbox" id="shape1" name="shape1" value="rectangle">
                <label for="shape1">Rectangle</label>
            </div>
            <div class="field">
                <input type="checkbox" id="shape2" name="shape2" value="sphere">
                <label for="shape2">Sphere</label>
            </div>
            <div class="field">
                <input type="checkbox" id="shape3" name="shape3" value="square">
                <label for="shape3">Square</label>
            </div>
            <div class="field">
                <input type="checkbox" id="shape4" name="shape4" value="triangle">
                <label for="shape4">Triangle</label>
            </div>
        </form>
        <script type="module" src="js/app.js"></script>
    </body>
</html>
