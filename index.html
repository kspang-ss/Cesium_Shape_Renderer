<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Cesium Shape Renderer</title>
        <link rel="shortcut icon" href="img/favicon.ico"/>

        <!-- Vendor -->
        <script src="Cesium/Cesium.js"></script>
        <link href="Cesium/Widgets/widgets.css" rel="stylesheet">

        <!-- Custom -->
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="cesiumContainer"></div>
        <form id="toolBar">
            <div class="field">
                <input type="checkbox" id="rectangles" name="rectangles" value="rectangle" checked>
                <label for="rectangles">Rectangle</label>
            </div>
            <div class="field">
                <input type="checkbox" id="spheres" name="spheres" value="sphere" checked>
                <label for="spheres">Sphere</label>
            </div>
            <div class="field">
                <input type="checkbox" id="squares" name="squares" value="square" checked>
                <label for="squares">Square</label>
            </div>
            <div class="field">
                <input type="checkbox" id="triangles" name="triangles" value="triangle" checked>
                <label for="triangles">Triangle</label>
            </div>
        </form>
        <script src="js/data.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
